spring:
  application:
    name: Inning-Log
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/inning_log}
    username: ${SPRING_DATASOURCE_USERNAME:inning_user}
    password: ${SPRING_DATASOURCE_PASSWORD:inning_password}
  docker:
    compose:
      enabled: true
      file: compose.yaml
  flyway:
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: 1
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  auth:
    dev-token-enabled: ${APP_AUTH_DEV_TOKEN_ENABLED:false}
  jwt:
    issuer: ${JWT_ISSUER:inning-log}
    secret: ${JWT_SECRET:change-this-dev-secret-at-least-32-bytes-long}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:1h}
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
      issuers:
        - https://accounts.google.com
        - accounts.google.com
