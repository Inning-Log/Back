name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IMAGE_TAR: inning-log-${{ github.sha }}.tar

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME || 'inning-log' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Save image as artifact
        run: docker save $IMAGE_NAME:${{ github.sha }} -o $IMAGE_TAR

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ${{ env.IMAGE_TAR }}
          retention-days: 1

  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: build-image
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME || 'inning-log' }}
      CONTAINER_NAME: ${{ secrets.DOCKER_CONTAINER_NAME || 'inning-log' }}
      APP_PORT: ${{ secrets.APP_PORT || '8080' }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
      APP_BIND_ADDRESS: ${{ secrets.APP_BIND_ADDRESS || '127.0.0.1' }}
      APP_HOST_PORT: ${{ secrets.APP_HOST_PORT || '8080' }}
      EC2_ENV_FILE: ${{ secrets.EC2_ENV_FILE || '/etc/inninglog/inninglog.env' }}

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$EC2_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Check EC2 env file
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "test -f '$EC2_ENV_FILE'"

      - name: Upload image to EC2
        run: |
          scp -i ~/.ssh/ec2_key -P "$EC2_PORT" \
            "$IMAGE_TAR" \
            "$EC2_USER@$EC2_HOST:/tmp/"

      - name: Load Docker image on EC2
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "docker load -i /tmp/$IMAGE_TAR"

      - name: Stop previous container
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "docker stop $CONTAINER_NAME || true && docker rm $CONTAINER_NAME || true"

      - name: Start new container
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              --env-file $EC2_ENV_FILE \
              -p $APP_BIND_ADDRESS:$APP_HOST_PORT:$APP_PORT \
              $IMAGE_NAME:${{ github.sha }}"

      - name: Health check
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "for i in \$(seq 1 20); do \
              if curl -fsS http://localhost:$APP_HOST_PORT/api/health; then exit 0; fi; \
              sleep 3; \
            done; \
            docker logs --tail 100 $CONTAINER_NAME; \
            exit 1"

      - name: Cleanup remote temporary files
        if: always()
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "rm -f /tmp/$IMAGE_TAR && docker image prune -f"
