name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

env:
  IMAGE_TAR: inning-log-${{ github.sha }}.tar

jobs:
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME || 'inning-log' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Save image as artifact
        run: docker save $IMAGE_NAME:${{ github.sha }} -o $IMAGE_TAR

      - name: Show image tar size
        run: ls -lh "$IMAGE_TAR"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ${{ env.IMAGE_TAR }}
          retention-days: 1

  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: build-image
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME || 'inning-log' }}
      CONTAINER_NAME: ${{ secrets.DOCKER_CONTAINER_NAME || 'inning-log' }}
      APP_PORT: ${{ secrets.APP_PORT || '8080' }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
      APP_BIND_ADDRESS: ${{ secrets.APP_BIND_ADDRESS || '127.0.0.1' }}
      APP_HOST_PORT: ${{ secrets.APP_HOST_PORT || '8080' }}
      EC2_ENV_FILE: ${{ secrets.EC2_ENV_FILE || '/etc/inninglog/inninglog.env' }}
      REMOTE_DEPLOY_DIR: ${{ secrets.REMOTE_DEPLOY_DIR || '/home/ubuntu/deploy' }}
      AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}
      BACKEND_SECURITY_GROUP_ID: ${{ secrets.BACKEND_SECURITY_GROUP_ID }}

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Open SSH for GitHub Actions runner
        id: open_ssh
        run: |
          RUNNER_IP=$(curl -fsS https://checkip.amazonaws.com | tr -d '\n')
          RUNNER_CIDR="${RUNNER_IP}/32"

          echo "runner_cidr=$RUNNER_CIDR" >> "$GITHUB_OUTPUT"
          echo "Opening SSH access for $RUNNER_CIDR"

          set +e
          OUTPUT=$(aws ec2 authorize-security-group-ingress \
            --group-id "$BACKEND_SECURITY_GROUP_ID" \
            --ip-permissions "IpProtocol=tcp,FromPort=$EC2_PORT,ToPort=$EC2_PORT,IpRanges=[{CidrIp=$RUNNER_CIDR,Description=github-actions-$GITHUB_RUN_ID}]" 2>&1)
          STATUS=$?
          set -e

          if [ $STATUS -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "InvalidPermission.Duplicate"; then
              echo "SSH rule already exists for $RUNNER_CIDR"
            else
              echo "$OUTPUT"
              exit $STATUS
            fi
          fi

          sleep 5

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

          for i in $(seq 1 10); do
            if ssh-keyscan -p "$EC2_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              exit 0
            fi
            echo "ssh-keyscan failed. retry $i..."
            sleep 3
          done

          echo "ssh-keyscan failed after retries"
          exit 1

      - name: Check EC2 env file
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "test -f '$EC2_ENV_FILE'"

      - name: Prepare remote deploy directory
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "mkdir -p '$REMOTE_DEPLOY_DIR' && df -h '$REMOTE_DEPLOY_DIR'"

      - name: Upload image to EC2
        run: |
          scp -i ~/.ssh/ec2_key -P "$EC2_PORT" \
            "$IMAGE_TAR" \
            "$EC2_USER@$EC2_HOST:$REMOTE_DEPLOY_DIR/"

      - name: Load Docker image on EC2
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "docker load -i '$REMOTE_DEPLOY_DIR/$IMAGE_TAR'"

      - name: Stop previous container
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "docker stop '$CONTAINER_NAME' || true && docker rm '$CONTAINER_NAME' || true"

      - name: Start new container
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "docker run -d \
              --name '$CONTAINER_NAME' \
              --restart unless-stopped \
              --env-file '$EC2_ENV_FILE' \
              -p '$APP_BIND_ADDRESS:$APP_HOST_PORT:$APP_PORT' \
              '$IMAGE_NAME:${{ github.sha }}'"

      - name: Health check
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "for i in \$(seq 1 20); do \
              if curl -fsS http://127.0.0.1:$APP_HOST_PORT/api/health; then exit 0; fi; \
              sleep 3; \
            done; \
            docker logs --tail 100 '$CONTAINER_NAME'; \
            exit 1"

      - name: Cleanup remote temporary files
        if: always()
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "rm -f '$REMOTE_DEPLOY_DIR/$IMAGE_TAR' && docker image prune -f" || true

      - name: Close SSH for GitHub Actions runner
        if: always()
        run: |
          RUNNER_CIDR="${{ steps.open_ssh.outputs.runner_cidr }}"

          if [ -z "$RUNNER_CIDR" ]; then
            echo "No runner CIDR found. Skip closing SSH rule."
            exit 0
          fi

          echo "Closing SSH access for $RUNNER_CIDR"

          aws ec2 revoke-security-group-ingress \
            --group-id "$BACKEND_SECURITY_GROUP_ID" \
            --protocol tcp \
            --port "$EC2_PORT" \
            --cidr "$RUNNER_CIDR" || true